# Single-node prod profile (Docker) — Rust bridge + L1 relayer sidecar
# Usage:
#   $env:JWT_SECRET="<random>"; $env:RPC_API_KEYS="<key>"; $env:BRIDGE_ORACLE_SECRET="<random>"
#   $env:CORS_ORIGINS="https://explorer.example.com"; $env:ETH_RPC_URL="https://..."
#   .\scripts\docker_prod.ps1
#   python scripts/prod_smoke.py http://127.0.0.1:8080

x-abs-prod-env: &abs-prod-env
  PYTHONUTF8: "1"
  PYTHONIOENCODING: utf-8
  DEPLOYMENT_MODE: prod
  CHAIN_ID: "778888"
  HTTP_HOST: "0.0.0.0"
  RPC_HOST: "0.0.0.0"
  WS_HOST: "0.0.0.0"
  P2P_HOST: "0.0.0.0"
  ABS_REQUIRE_NATIVE_CRYPTO: "true"
  BRIDGE_MODE: rust
  RUST_BRIDGE_PATH: bridge/abs_bridge_bin
  BRIDGE_AUTO_CONFIRM_SEC: "0"
  BRIDGE_REQUIRE_L1_PROOF: "true"
  BRIDGE_PROBE_L1_RPC: ${BRIDGE_PROBE_L1_RPC:-true}
  BRIDGE_L1_QUEUE_PATH: /app/data/bridge_l1_queue.json
  ETH_RPC_URL: ${ETH_RPC_URL:?set ETH_RPC_URL before starting prod bridge}
  JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET before starting prod}
  RPC_API_KEYS: ${RPC_API_KEYS:?set RPC_API_KEYS before starting prod}
  BRIDGE_ORACLE_SECRET: ${BRIDGE_ORACLE_SECRET:?set BRIDGE_ORACLE_SECRET before starting prod}
  RPC_API_KEY_REQUIRED: "true"
  JWT_ENFORCE_ADMIN: "true"
  REQUIRE_WALLET_FILE: "true"
  CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS before starting prod}
  RATE_LIMIT_RPM: "120"

services:
  node:
    build:
      context: .
      dockerfile: Dockerfile.prod
    hostname: abs-prod
    ports:
      - "8545:8545"
      - "8080:8080"
      - "5000:5000"
      - "8766:8766"
    environment:
      <<: *abs-prod-env
      NODE_ID: docker-prod-1
    volumes:
      - abs-prod-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/ready', timeout=5)",
        ]
      interval: 20s
      timeout: 8s
      retries: 8
      start_period: 90s
    networks:
      - abs-prod
    restart: unless-stopped

  relayer:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command:
      [
        "python",
        "scripts/bridge_relayer.py",
        "--interval",
        "30",
        "--watch-l1",
        "--api",
        "http://node:8080",
      ]
    environment:
      <<: *abs-prod-env
      ABS_API_URL: http://node:8080
    volumes:
      - abs-prod-data:/app/data
    depends_on:
      node:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "scripts/bridge_relayer.py",
          "--preflight",
          "--api",
          "http://node:8080",
        ]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s
    networks:
      - abs-prod
    restart: unless-stopped

volumes:
  abs-prod-data:

networks:
  abs-prod:
    driver: bridge
