name: Build Native Wheel & Smoke Test

permissions:
  contents: read

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ ci/native-wheel/** ]
  workflow_dispatch:

jobs:
  build-wheel:
    name: Build native wheel and run smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Build native wheel (maturin)
        run: |
          cd native/abs_native
          python -m maturin build --release --out target/wheels

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-wheels
          path: native/abs_native/target/wheels/*.whl

      - name: Install built wheel
        run: |
          python -m pip install --force-reinstall native/abs_native/target/wheels/*.whl
          python -c "import abs_native; print('abs_native OK:', abs_native.sha256_hex(b'absolute')[:16])"

      - name: Smoke tests (native fast-sync + consensus)
        env:
          PYTHONUTF8: "1"
        run: |
          pytest tests/unit/test_native_consensus_hash.py tests/unit/test_sync_incremental.py -q --tb=short

  lint-and-smoke:
    name: Lint & quick checks
    runs-on: ubuntu-latest
    needs: build-wheel
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -c "
          import os, py_compile
          skip = {'_archive','__pycache__','.git','venv','.venv'}
          errs = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in skip]
              for f in files:
                  if f.endswith('.py') and not f.startswith('_'):
                      p = os.path.join(root, f)
                      try: py_compile.compile(p, doraise=True)
                      except py_compile.PyCompileError as e: errs.append(str(e))
          if errs: raise SystemExit('\\n'.join(errs[:20]))
          print('OK: syntax clean')
          "

      - name: Quick Merkle smoke
        run: python tests/smoke/merkle_light.py
