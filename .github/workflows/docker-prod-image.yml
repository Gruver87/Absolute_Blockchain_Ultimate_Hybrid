name: Docker prod image

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/gruver87/abs-blockchain-node
  CI_TAG: abs-blockchain-prod:ci

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ github.event_name == 'pull_request' && env.CI_TAG || steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            IMG="${{ env.CI_TAG }}"
          else
            docker pull "${{ env.IMAGE_NAME }}:latest"
            IMG="${{ env.IMAGE_NAME }}:latest"
          fi
          docker run --rm "$IMG" python -c \
            "import abs_native; assert hasattr(abs_native, 'RocksEngine'); print('abs_native OK')"
