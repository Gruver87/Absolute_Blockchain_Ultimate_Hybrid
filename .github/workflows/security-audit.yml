name: Security audit

permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  pip-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit requirements.txt
        run: pip-audit -r requirements.txt --desc on

  cargo-audit:
    name: Dependency audit (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit native/abs_native
        run: cargo audit --file native/abs_native/Cargo.lock

      - name: Audit bridge/rust_bridge
        run: cargo audit --file bridge/rust_bridge/Cargo.lock

  bridge-off-gate:
    name: Bridge OFF audit gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bridge OFF audit gate
        run: python scripts/bridge_off_audit_gate.py
