name: Blockchain Tests

permissions:
  contents: read

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: Hybrid Node Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Set up Rust toolchain
      run: |
        rustup toolchain install stable --profile minimal
        rustup default stable

    - name: Rust format check (abs_native + rust_bridge)
      if: matrix.python-version == '3.12'
      run: |
        cargo fmt --manifest-path native/abs_native/Cargo.toml --all -- --check
        cargo fmt --manifest-path bridge/rust_bridge/Cargo.toml --all -- --check

    - name: Rust clippy strict (abs_native + rust_bridge)
      if: matrix.python-version == '3.12'
      run: |
        cargo clippy --manifest-path native/abs_native/Cargo.toml --all-targets -- -D warnings
        cargo clippy --manifest-path bridge/rust_bridge/Cargo.toml --all-targets -- -D warnings

    - name: Install native build deps (RocksDB/bindgen)
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          clang libclang-dev cmake pkg-config \
          libsnappy-dev zlib1g-dev libbz2-dev liblz4-dev libzstd-dev

    - name: Build native crypto
      run: bash scripts/build_native.sh

    - name: Build Rust bridge CLI
      run: |
        source "$HOME/.cargo/env"
        bash scripts/build_bridge.sh

    - name: Native crypto required self-test
      run: python -c "from crypto import native; s=native.native_crypto_status(required=True); assert s['available'] and s['self_test'], s; print('OK native:', s)"

    - name: Secret scan (block keys in repo)
      run: python scripts/check_secrets.py

    - name: Incident runbook check
      if: matrix.python-version == '3.12'
      run: python scripts/runbook_check.py

    - name: DR backup drill (SQLite)
      if: matrix.python-version == '3.12'
      run: python scripts/backup_db_drill.py

    - name: DR backup drill (RocksDB)
      if: matrix.python-version == '3.12'
      run: python scripts/backup_rocks_drill.py

    - name: Genesis ceremony artifact (mainnet-v1 profile)
      if: matrix.python-version == '3.12'
      run: |
        python scripts/genesis_ceremony.py \
          --config node.prod.mainnet-v1.example.json \
          --manifest validators.manifest.mainnet-v1.example.json

    - name: Ceremony keygen (CI strict gates)
      if: matrix.python-version == '3.12'
      run: |
        python scripts/genesis_ceremony_keygen.py \
          --out-dir data/ceremony_keys_ci \
          --config node.prod.mainnet-v1.example.json \
          --template validators.manifest.mainnet-v1.example.json

    - name: Syntax check (compile all active modules)
      run: |
        python -c "
        import os, py_compile
        skip = {'_archive','__pycache__','.git','venv','.venv'}
        errs = []
        for root, dirs, files in os.walk('.'):
            dirs[:] = [d for d in dirs if d not in skip]
            for f in files:
                if f.endswith('.py') and not f.startswith('_'):
                    p = os.path.join(root, f)
                    try: py_compile.compile(p, doraise=True)
                    except py_compile.PyCompileError as e: errs.append(str(e))
        if errs: raise SystemExit('\n'.join(errs[:20]))
        print('OK: syntax clean')
        "

    - name: Merkle + Light Client test
      run: python tests/smoke/merkle_light.py

    - name: Pytest (unit + integration)
      env:
        PYTHONUTF8: "1"
      run: pytest tests/ -q --tb=short

    - name: Bridge + pool devnet API tests
      if: matrix.python-version == '3.12'
      env:
        PYTHONUTF8: "1"
      run: |
        pytest tests/unit/test_bridge_incoming.py \
          tests/unit/test_bridge_confirm_pending.py \
          tests/unit/test_bridge_manual.py \
          tests/unit/test_devnet_pool_spend.py \
          tests/unit/test_pool_dao.py \
          tests/unit/test_telegram_bot_bridge.py \
          tests/unit/test_api_prod_auth.py \
          tests/unit/test_bridge_relayer.py \
          tests/unit/test_bridge_relayer_core.py \
          tests/unit/test_prod_compose.py \
          tests/unit/test_prod_smoke.py \
          tests/unit/test_verify_prod_stack.py \
          -q --tb=short

    - name: Hybrid native and bridge critical tests
      if: runner.os == 'Linux' && matrix.python-version == '3.12'
      run: |
        pytest \
          tests/unit/test_rust_bridge_cli.py \
          tests/unit/test_rust_bridge_e2e.py \
          tests/unit/test_native_crypto.py \
          tests/unit/test_state_root_native.py \
          tests/unit/test_secp256k1.py \
          tests/unit/test_chain_integrity.py \
          tests/unit/test_api.py \
          tests/unit/test_prod_config.py \
          tests/unit/test_bridge_health.py \
          tests/unit/test_native_consensus_hash.py \
          tests/unit/test_native_consensus_select.py \
          tests/unit/test_native_p2p_wire.py \
          tests/unit/test_native_amount_state.py \
          tests/unit/test_native_peer_validation.py \
          tests/unit/test_native_deploy_address.py \
          tests/unit/test_rlp_native.py \
          tests/unit/test_eth_raw_tx.py \
          tests/unit/test_genesis_deterministic.py \
          tests/unit/test_genesis_ceremony.py \
          tests/unit/test_ceremony_keygen.py \
          tests/unit/test_ceremony_deploy.py \
          tests/unit/test_config_genesis_manifest.py \
          tests/unit/test_consensus_unified.py \
          tests/unit/test_p2p_ghost_head.py \
          tests/unit/test_external_audit_automation.py \
          tests/unit/test_mainnet_launch_checklist.py \
          tests/unit/test_bridge_l1_cutover.py \
          tests/unit/test_mempool_batch_signatures.py \
          tests/unit/test_evm_keccak_native.py \
          tests/unit/test_evm_native_u256.py \
          tests/unit/test_evm_native_cmp_memory.py \
          tests/unit/test_evm_native_arith_extended.py \
          tests/unit/test_evm_native_read_push.py \
          tests/unit/test_evm_native_jumpdest.py \
          tests/unit/test_evm_native_stack.py \
          tests/unit/test_evm_native_scan.py \
          tests/unit/test_evm_native_pure_runner.py \
          tests/unit/test_evm_native_host_ops.py \
          tests/unit/test_evm_host_bridge.py \
          tests/unit/test_evm_prod_handoff.py \
          tests/unit/test_sync_incremental.py \
          tests/unit/test_rocks_store.py \
          tests/unit/test_mesh_mining_ready.py \
          tests/unit/test_rocks_reorg_meta.py \
          tests/unit/test_rocks_nft_tokens.py \
          tests/unit/test_rocks_evm_logs.py \
          tests/unit/test_rocks_blockchain_integration.py \
          tests/unit/test_chain_backup.py \
          -q

    - name: Monolith static gate
      if: matrix.python-version == '3.12'
      env:
        PYTHONUTF8: "1"
      run: python scripts/monolith_gate.py --bridge-cutover --json

    - name: Mainnet readiness (static, bridge cutover profile)
      if: matrix.python-version == '3.12'
      env:
        PYTHONUTF8: "1"
      run: |
        python scripts/mainnet_readiness.py --no-strict-audit --bridge-cutover

    - name: Docker prod image build (smoke)
      if: matrix.python-version == '3.12'
      run: docker build -f Dockerfile.prod -t absolute-blockchain-prod:ci .

    - name: Two-node P2P smoke (Linux CI mode)
      if: runner.os == 'Linux' && matrix.python-version == '3.12'
      env:
        PYTHONUTF8: "1"
      run: python scripts/verify_p2p_ci.py --mode ci

    - name: Prod profile unit + E2E boot
      if: runner.os == 'Linux' && matrix.python-version == '3.12'
      env:
        PYTHONUTF8: "1"
      run: |
        pytest tests/unit/test_prod_smoke_profile.py \
          tests/unit/test_prod_boot_e2e.py \
          tests/unit/test_wave54_state_consistency.py \
          -q --tb=short

    - name: Public testnet gate (static)
      if: matrix.python-version == '3.12'
      run: python scripts/public_testnet_gate.py

    - name: Bridge OFF audit gate
      if: matrix.python-version == '3.12'
      run: python scripts/bridge_off_audit_gate.py

    - name: Export audit pack (soak-safe static)
      if: matrix.python-version == '3.12'
      run: python scripts/export_audit_pack.py --no-sync-automated --no-zip --out-dir logs/ci_audit_pack

    - name: Industrial static gate
      if: matrix.python-version == '3.12'
      run: python scripts/industrial_gate.py

    - name: K8s prod manifest gate
      if: matrix.python-version == '3.12'
      run: python scripts/k8s_prod_gate.py

    - name: Mainnet launch checklist (code gates)
      if: matrix.python-version == '3.12'
      run: python scripts/mainnet_launch_checklist.py

    - name: Mainnet launch checklist (strict ceremony + keys)
      if: matrix.python-version == '3.12'
      run: |
        python scripts/mainnet_launch_checklist.py \
          --strict-mainnet \
          --strict-keys \
          --ceremony-dir data/ceremony_keys_ci

    - name: Prod mesh3 spawn + CI recovery drill (ceremony 3-validator)
      if: runner.os == 'Linux' && matrix.python-version == '3.12'
      timeout-minutes: 55
      env:
        PYTHONUTF8: "1"
      run: |
        python scripts/verify_p2p_ci.py --mode prod-mesh3-ci-recovery --ceremony-dir data/ceremony_keys_ci

    - name: Prod-profile P2P smoke (Linux)
      if: runner.os == 'Linux' && matrix.python-version == '3.12'
      env:
        PYTHONUTF8: "1"
      run: python scripts/verify_p2p_ci.py --mode prod-smoke

    - name: Three-node adversarial CI (fork + slashing)
      if: runner.os == 'Linux' && matrix.python-version == '3.12'
      env:
        PYTHONUTF8: "1"
      run: python scripts/verify_p2p_ci.py --mode ci3

    - name: Load test (health endpoint)
      run: python scripts/load_test.py --spawn-local --workers 6 --requests 20

    - name: Import main module
      run: python -c "import main; print('main.py OK')"

    - name: Final audit
      run: python scripts/final_audit.py
