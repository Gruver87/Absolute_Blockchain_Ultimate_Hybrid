name: Publish Wheel on Release

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install native build deps (RocksDB/bindgen)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev cmake pkg-config \
            libsnappy-dev zlib1g-dev libbz2-dev liblz4-dev libzstd-dev

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip maturin
          cd native/abs_native
          python -m maturin build --release --out target/wheels

      - name: Publish to PyPI
        if: secrets.PYPI_API_TOKEN != ''
        env:
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
          TWINE_USERNAME: __token__
        run: |
          python -m pip install --upgrade pip twine
          python -m twine upload native/abs_native/target/wheels/*.whl -u "$TWINE_USERNAME" -p "$TWINE_PASSWORD"

      - name: Upload wheel artifact to release
        uses: softprops/action-gh-release@v1
        with:
          files: native/abs_native/target/wheels/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

