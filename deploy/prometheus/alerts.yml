# Prometheus alert rules for Absolute Blockchain node
groups:
  - name: absolute_blockchain_node
    rules:
      - alert: AbsoluteNodeDown
        expr: absent(abs_uptime_seconds) or abs_uptime_seconds == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Absolute node {{ $labels.node_id }} is down"
          description: "No uptime metric for 2 minutes."

      - alert: AbsoluteNoPeers
        expr: abs_peers_connected == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Node {{ $labels.node_id }} has no P2P peers"
          description: "Peer count is 0 for 10 minutes."

      - alert: AbsoluteMempoolBacklog
        expr: abs_mempool_size > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Large mempool on {{ $labels.node_id }}"
          description: "Mempool size {{ $value }} > 500 for 5m."

      - alert: AbsoluteHighErrorRate
        expr: rate(abs_errors_total[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API error rate on {{ $labels.node_id }}"
          description: "API error rate is above 1 error/sec for 5 minutes."

      - alert: AbsoluteRustBridgeDown
        expr: abs_rust_bridge_required == 1 and abs_rust_bridge_ok == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Rust bridge is not ready on {{ $labels.node_id }}"
          description: "Production bridge is required but abs_bridge_bin failed its JSON smoke-test."

      - alert: AbsoluteL1RpcDown
        expr: abs_l1_rpc_required == 1 and abs_l1_rpc_ok == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "L1 RPC unreachable on {{ $labels.node_id }}"
          description: "Production bridge requires live L1 JSON-RPC but eth_blockNumber probe failed."

      - alert: AbsoluteP2PShapeRejectBurst
        expr: rate(abs_p2p_shape_rejects_total[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elevated P2P shape rejects on {{ $labels.node_id }}"
          description: "Fail-closed wire/shape rejects are above 0.5/sec for 5 minutes."

      - alert: AbsoluteP2PHandshakeRejectBurst
        expr: rate(abs_p2p_handshake_rejects_total[5m]) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elevated P2P handshake rejects on {{ $labels.node_id }}"
          description: "Handshake rejects are above 0.2/sec for 5 minutes."

      - alert: AbsoluteP2PActiveBansHigh
        expr: abs_p2p_active_bans > 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High active P2P ban count on {{ $labels.node_id }}"
          description: "More than 10 peer keys currently banned for 10 minutes."

      - alert: AbsoluteP2PRateLimitBurst
        expr: rate(abs_p2p_rate_limit_drops_total[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elevated P2P rate-limit drops on {{ $labels.node_id }}"
          description: "Per-peer rate-limit strikes are above 1/sec for 5 minutes."

      - alert: AbsoluteP2PPeerSendFailBurst
        expr: rate(abs_p2p_peer_send_fail_total[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elevated P2P outbound send failures on {{ $labels.node_id }}"
          description: "Peer.send failures are above 0.5/sec for 5 minutes."

      - alert: AbsoluteRocksBlockCacheUnset
        expr: abs_native_crypto_required == 1 and abs_rocksdb_block_cache_mb == 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "RocksDB block cache unset on {{ $labels.node_id }}"
          description: "Prod-like node (native crypto required) reports rocksdb block_cache_mb=0."

      - alert: AbsoluteRocksWriteBufferUnset
        expr: abs_native_crypto_required == 1 and abs_rocksdb_write_buffer_mb == 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "RocksDB write buffer unset on {{ $labels.node_id }}"
          description: "Prod-like node (native crypto required) reports rocksdb write_buffer_mb=0."
