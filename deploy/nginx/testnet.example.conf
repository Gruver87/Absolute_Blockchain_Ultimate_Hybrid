# Illustrative nginx reverse proxy for public testnet (TLS required before DNS).
# Replace testnet.example.com and certificate paths.

upstream abs_testnet_http {
    server 127.0.0.1:19080;
}

upstream abs_testnet_rpc {
    server 127.0.0.1:19085;
}

limit_req_zone $binary_remote_addr zone=abs_testnet_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=abs_testnet_rpc:10m rate=5r/s;

server {
    listen 80;
    server_name testnet.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name testnet.example.com;

  # ssl_certificate     /etc/letsencrypt/live/testnet.example.com/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/testnet.example.com/privkey.pem;

    location /api/ {
        limit_req zone=abs_testnet_api burst=40 nodelay;
        proxy_pass http://abs_testnet_http/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /rpc/ {
        limit_req zone=abs_testnet_rpc burst=20 nodelay;
        proxy_pass http://abs_testnet_rpc/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-Key $http_x_api_key;
    }

    location / {
        root /var/www/abs-explorer;
        try_files $uri $uri/ /index.html;
    }
}
