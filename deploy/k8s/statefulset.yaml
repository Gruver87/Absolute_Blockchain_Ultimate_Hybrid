apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: abs-node
  namespace: absolute-chain
spec:
  serviceName: abs-p2p
  replicas: 3
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: abs-node
  template:
    metadata:
      labels:
        app: abs-node
    spec:
      containers:
        - name: node
          image: absolute-blockchain-prod:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/app/deploy/k8s/entrypoint.sh"]
          ports:
            - name: http
              containerPort: 8080
            - name: rpc
              containerPort: 8545
            - name: p2p
              containerPort: 5000
            - name: ws
              containerPort: 8766
          envFrom:
            - configMapRef:
                name: abs-node-config
            - secretRef:
                name: abs-node-secrets
          env:
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: node-config
              mountPath: /app/config
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
      volumes:
        - name: node-config
          configMap:
            name: abs-node-json
            items:
              - key: node.prod.k8s.json
                path: node.prod.k8s.json
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
