apiVersion: v1
kind: ConfigMap
metadata:
  name: abs-node-config
  namespace: absolute-chain
data:
  DEPLOYMENT_MODE: "prod"
  CHAIN_ID: "778888"
  DB_ENGINE: "rocksdb"
  ROCKSDB_SYNC: "FULL"
  ROCKSDB_BLOCK_CACHE_MB: "256"
  ROCKSDB_WRITE_BUFFER_MB: "64"
  ROCKSDB_COLUMN_FAMILIES: "false"
  DATA_DIR: "/app/data"
  HTTP_PORT: "8080"
  RPC_PORT: "8545"
  P2P_PORT: "5000"
  WS_PORT: "8766"
  P2P_MAX_MESSAGE_BYTES: "2097152"
  P2P_MAX_MESSAGES_PER_SEC: "500"
  P2P_BAN_SECONDS: "300"
  P2P_RATE_LIMIT_STRIKES: "5"
  HTTP_HOST: "0.0.0.0"
  RPC_HOST: "0.0.0.0"
  P2P_HOST: "0.0.0.0"
  WS_HOST: "0.0.0.0"
  METRICS_ENABLED: "true"
  ABS_REQUIRE_NATIVE_CRYPTO: "true"
  REDIS_RATE_LIMIT: "true"
  REDIS_URL: "redis://abs-redis:6379/0"
  RATE_LIMIT_RPM: "120"
  BOOTSTRAP_PEERS: "abs-node-0.abs-p2p.absolute-chain.svc.cluster.local:5000"
  FOLLOWER_GENESIS_SYNC: "true"
  CORS_ORIGINS: "https://explorer.example.com"
  ENABLE_CORS_RPC_PROXY: "false"
  JWT_ENFORCE_ADMIN: "true"
  RPC_API_KEY_REQUIRED: "true"
  BRIDGE_MODE: "rust"
  RUST_BRIDGE_PATH: "bridge/abs_bridge_bin"
  BRIDGE_AUTO_CONFIRM_SEC: "0"
  BRIDGE_REQUIRE_L1_PROOF: "true"
  BRIDGE_PROBE_L1_RPC: "false"
  BRIDGE_ENABLED: "false"
  BRIDGE_L1_QUEUE_PATH: "/app/data/bridge_l1_queue.json"
  VALIDATORS_MANIFEST_PATH: "data/validators.manifest.json"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: abs-node-json
  namespace: absolute-chain
data:
  node.prod.k8s.json: |
    {
      "node_id": "k8s-abs-node",
      "network_name": "Absolute Mainnet",
      "chain_id": 778888,
      "deployment_mode": "prod",
      "http_host": "0.0.0.0",
      "rpc_host": "0.0.0.0",
      "ws_host": "0.0.0.0",
      "p2p_host": "0.0.0.0",
      "p2p_port": 5000,
      "http_port": 8080,
      "rpc_port": 8545,
      "ws_port": 8766,
      "p2p_max_message_bytes": 2097152,
      "p2p_max_messages_per_sec": 500,
      "p2p_ban_seconds": 300,
      "p2p_rate_limit_strikes": 5,
      "p2p_evict_min_score": 0,
      "p2p_tls_enabled": true,
      "p2p_tls_cert_path": "/app/p2p_tls/node.pem",
      "p2p_tls_key_path": "/app/p2p_tls/node.key",
      "p2p_tls_ca_path": "/app/p2p_tls/ca.pem",
      "p2p_tls_require_client_cert": true,
      "p2p_tls_fail_closed": true,
      "p2p_tls_bind_identity": true,
      "redis_rate_limit_enabled": true,
      "redis_url": "redis://abs-redis:6379/0",
      "bootstrap_peers": ["abs-node-0.abs-p2p.absolute-chain.svc.cluster.local:5000"],
      "follower_genesis_sync": true,
      "mining_enabled": false,
      "require_signatures": true,
      "require_native_crypto": true,
      "enforce_proposer": true,
      "verify_peer_state_root": true,
      "state_root_strict_p2p": true,
      "bridge_enabled": false,
      "bridge_mode": "rust",
      "bridge_require_l1_proof": true,
      "evm_create2_eip1014": true,
      "evm_require_deploy_salt": true,
      "rate_limit_rpm": 120,
      "rpc_api_key_required": true,
      "jwt_enforce_admin": true,
      "require_wallet_file": true,
      "consensus_mode": "unified",
      "feature_zk": false,
      "feature_sharding": false,
      "feature_oracles": false,
      "feature_wasm": false,
      "feature_plasma": false,
      "feature_lightning": false,
      "feature_pq": false,
      "feature_mev": false,
      "feature_ai_agents": false,
      "sqlite_synchronous": "FULL",
      "db_engine": "rocksdb",
      "rocksdb_sync": "FULL",
      "rocksdb_block_cache_mb": 256,
      "rocksdb_write_buffer_mb": 64,
      "rocksdb_column_families": false,
      "log_json": true,
      "enable_cors_rpc_proxy": false,
      "cors_origins": ["https://explorer.example.com"],
      "db_path": "data/blockchain.db",
      "log_file": "data/node.log",
      "validators_manifest_path": "data/validators.manifest.json"
    }
