# Per-replica P2P mTLS material for abs-node StatefulSet (ordinal 0..N-1).
# Generate with scripts/gen_p2p_dev_tls.py per node_id, then pack into one secret:
#   kubectl create secret generic abs-p2p-tls --from-file=ca.pem=... \
#     --from-file=node-0.pem=... --from-file=node-0.key=... \
#     --from-file=node-1.pem=... --from-file=node-1.key=... \
#     -n absolute-chain
apiVersion: v1
kind: Secret
metadata:
  name: abs-p2p-tls
  namespace: absolute-chain
type: Opaque
stringData:
  ca.pem: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_CA_PEM
    -----END CERTIFICATE-----
  node-0.pem: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_NODE0_CERT
    -----END CERTIFICATE-----
  node-0.key: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_NODE0_KEY
    -----END PRIVATE KEY-----
  node-1.pem: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_NODE1_CERT
    -----END CERTIFICATE-----
  node-1.key: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_NODE1_KEY
    -----END PRIVATE KEY-----
  node-2.pem: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_NODE2_CERT
    -----END CERTIFICATE-----
  node-2.key: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_NODE2_KEY
    -----END PRIVATE KEY-----
