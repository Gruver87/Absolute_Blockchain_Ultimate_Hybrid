# Three-node production mesh (mainnet-v1 ceremony manifest + per-validator wallets)
# Usage:
#   .\scripts\docker_prod_3node.ps1 -CeremonyDir data/ceremony_keys

x-abs-prod-env: &abs-prod-env
  PYTHONUTF8: "1"
  PYTHONIOENCODING: utf-8
  DEPLOYMENT_MODE: prod
  DATA_DIR: /app/data
  DB_ENGINE: rocksdb
  ROCKSDB_SYNC: FULL
  ROCKSDB_BLOCK_CACHE_MB: "256"
  ROCKSDB_WRITE_BUFFER_MB: "64"
  ROCKSDB_COLUMN_FAMILIES: "false"
  CHAIN_ID: "778888"
  HTTP_HOST: "0.0.0.0"
  RPC_HOST: "0.0.0.0"
  WS_HOST: "0.0.0.0"
  P2P_HOST: "0.0.0.0"
  ABS_REQUIRE_NATIVE_CRYPTO: "true"
  BRIDGE_MODE: rust
  RUST_BRIDGE_PATH: bridge/abs_bridge_bin
  BRIDGE_AUTO_CONFIRM_SEC: "0"
  BRIDGE_REQUIRE_L1_PROOF: "true"
  BRIDGE_PROBE_L1_RPC: ${BRIDGE_PROBE_L1_RPC:-false}
  BRIDGE_ENABLED: ${BRIDGE_ENABLED:-false}
  BRIDGE_L1_QUEUE_PATH: /app/data/bridge_l1_queue.json
  ETH_RPC_URL: ${ETH_RPC_URL:-}
  JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET before starting prod}
  RPC_API_KEYS: ${RPC_API_KEYS:?set RPC_API_KEYS before starting prod}
  BRIDGE_ORACLE_SECRET: ${BRIDGE_ORACLE_SECRET:-}
  RPC_API_KEY_REQUIRED: "true"
  JWT_ENFORCE_ADMIN: "true"
  REQUIRE_WALLET_FILE: "true"
  CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS before starting prod}
  RATE_LIMIT_RPM: "120"
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  REDIS_RATE_LIMIT: ${REDIS_RATE_LIMIT:-true}
  GENESIS_CEREMONY_HASH: ${GENESIS_CEREMONY_HASH:-}
  GENESIS_STRICT_MAINNET: ${GENESIS_STRICT_MAINNET:-false}
  VALIDATORS_MANIFEST_PATH: data/validators.manifest.json

x-prod-node-build: &prod-node-build
  image: ${ABS_PROD_IMAGE:-abs-blockchain-prod:local}
  build:
    context: .
    dockerfile: Dockerfile.prod

# Prevent unbounded container json logs from filling Docker Desktop VM disk
# (root cause of ~17-18h soak crashes / daemon.json corruption after OOM-like hangs).
x-abs-logging: &abs-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  redis:
    image: redis:7-alpine
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory",
        "128mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    volumes:
      - abs-prod-mesh-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    logging: *abs-logging
    mem_limit: 256m
    networks:
      - abs-prod-mesh
    restart: unless-stopped

  node1:
    <<: *prod-node-build
    hostname: abs-prod-mesh-1
    command: ["python", "main.py", "--config", "docker/node.prod.mesh1.json"]
    ports:
      - "${ABS_MESH_HTTP_PORT_1:-18180}:8080"
      - "${ABS_MESH_RPC_PORT_1:-18546}:8545"
      - "${ABS_MESH_P2P_PORT_1:-15001}:5000"
      - "${ABS_MESH_WS_PORT_1:-18767}:8766"
    environment:
      <<: *abs-prod-env
      NODE_ID: docker-prod-mesh-1
      MESH_MIN_PEERS_BEFORE_MINE: "2"
    volumes:
      - abs-prod-mesh1-data:/app/data
      - ./data/validators.manifest.json:/app/data/validators.manifest.json:ro
      - ./data/prod_mesh/wallets/validator-1.wallet.json:/app/data/wallet.json:ro
    logging: *abs-logging
    mem_limit: 1536m
    cpus: "1.5"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/ready', timeout=5)",
        ]
      interval: 20s
      timeout: 8s
      retries: 8
      start_period: 90s
    networks:
      - abs-prod-mesh
    restart: unless-stopped

  node2-db-seed:
    image: alpine:3.20
    profiles: ["seed"]
    volumes:
      - abs-prod-mesh1-data:/seed-from
      - abs-prod-mesh2-data:/seed-to
    environment:
      SKIP_DB_SEED: ${SKIP_DB_SEED:-0}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ "$$SKIP_DB_SEED" = "1" ]; then exit 0; fi
        if [ ! -d /seed-from/chainstore ]; then
          echo "FAIL: leader has no chainstore to seed"
          exit 1
        fi
        if [ -d /seed-from/chainstore ]; then
          rm -rf /seed-to/chainstore
          cp -a /seed-from/chainstore /seed-to/
          echo "node2 chainstore seeded from node1 (rocksdb)"
          exit 0
        fi
        if [ ! -f /seed-from/blockchain.db ]; then exit 0; fi
        apk add --no-cache sqlite >/dev/null
        sqlite3 /seed-from/blockchain.db "PRAGMA wal_checkpoint(TRUNCATE);"
        rm -f /seed-to/blockchain.db /seed-to/blockchain.db-shm /seed-to/blockchain.db-wal
        cp /seed-from/blockchain.db /seed-to/blockchain.db
        echo "node2 DB seeded from node1 (sqlite legacy)"
    restart: "no"
    networks:
      - abs-prod-mesh

  node3-db-seed:
    image: alpine:3.20
    profiles: ["seed"]
    volumes:
      - abs-prod-mesh1-data:/seed-from
      - abs-prod-mesh3-data:/seed-to
    environment:
      SKIP_DB_SEED: ${SKIP_DB_SEED:-0}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ "$$SKIP_DB_SEED" = "1" ]; then exit 0; fi
        if [ ! -d /seed-from/chainstore ]; then
          echo "FAIL: leader has no chainstore to seed"
          exit 1
        fi
        if [ -d /seed-from/chainstore ]; then
          rm -rf /seed-to/chainstore
          cp -a /seed-from/chainstore /seed-to/
          echo "node3 chainstore seeded from node1 (rocksdb)"
          exit 0
        fi
        if [ ! -f /seed-from/blockchain.db ]; then exit 0; fi
        apk add --no-cache sqlite >/dev/null
        sqlite3 /seed-from/blockchain.db "PRAGMA wal_checkpoint(TRUNCATE);"
        rm -f /seed-to/blockchain.db /seed-to/blockchain.db-shm /seed-to/blockchain.db-wal
        cp /seed-from/blockchain.db /seed-to/blockchain.db
        echo "node3 DB seeded from node1 (sqlite legacy)"
    restart: "no"
    networks:
      - abs-prod-mesh

  node2:
    <<: *prod-node-build
    hostname: abs-prod-mesh-2
    command: ["python", "main.py", "--config", "docker/node.prod.mesh2.json"]
    ports:
      - "${ABS_MESH_HTTP_PORT_2:-18181}:8080"
      - "${ABS_MESH_RPC_PORT_2:-18547}:8545"
      - "${ABS_MESH_P2P_PORT_2:-15002}:5000"
      - "${ABS_MESH_WS_PORT_2:-18768}:8766"
    environment:
      <<: *abs-prod-env
      NODE_ID: docker-prod-mesh-2
      BOOTSTRAP_PEERS: node1:5000
    volumes:
      - abs-prod-mesh2-data:/app/data
      - ./data/validators.manifest.json:/app/data/validators.manifest.json:ro
      - ./data/prod_mesh/wallets/validator-2.wallet.json:/app/data/wallet.json:ro
    logging: *abs-logging
    mem_limit: 1536m
    cpus: "1.5"
    depends_on:
      redis:
        condition: service_healthy
      node1:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/ready', timeout=5)",
        ]
      interval: 20s
      timeout: 8s
      retries: 8
      start_period: 90s
    networks:
      - abs-prod-mesh
    restart: unless-stopped

  node3:
    <<: *prod-node-build
    hostname: abs-prod-mesh-3
    command: ["python", "main.py", "--config", "docker/node.prod.mesh3.json"]
    ports:
      - "${ABS_MESH_HTTP_PORT_3:-18182}:8080"
      - "${ABS_MESH_RPC_PORT_3:-18548}:8545"
      - "${ABS_MESH_P2P_PORT_3:-15003}:5000"
      - "${ABS_MESH_WS_PORT_3:-18769}:8766"
    environment:
      <<: *abs-prod-env
      NODE_ID: docker-prod-mesh-3
      BOOTSTRAP_PEERS: node1:5000,node2:5000
    volumes:
      - abs-prod-mesh3-data:/app/data
      - ./data/validators.manifest.json:/app/data/validators.manifest.json:ro
      - ./data/prod_mesh/wallets/validator-3.wallet.json:/app/data/wallet.json:ro
    logging: *abs-logging
    mem_limit: 1536m
    cpus: "1.5"
    depends_on:
      redis:
        condition: service_healthy
      node1:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/ready', timeout=5)",
        ]
      interval: 20s
      timeout: 8s
      retries: 8
      start_period: 90s
    networks:
      - abs-prod-mesh
    restart: unless-stopped

volumes:
  abs-prod-mesh1-data:
  abs-prod-mesh2-data:
  abs-prod-mesh3-data:
  abs-prod-mesh-redis:

networks:
  abs-prod-mesh:
    driver: bridge
